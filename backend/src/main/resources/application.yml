server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:seu_market_dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB
  h2:
    console:
      enabled: true

jwt:
  secret: seu-market-dev-secret-change-in-production-must-be-long-enough
  expiration-ms: 604800000

auth:
  dev-fixed-code: "123456"
  code-expiration-minutes: 5
  send-interval-seconds: 60

app:
  security:
    dev-auth-enabled: true
  upload:
    dir: uploads
    max-size-bytes: 5242880
