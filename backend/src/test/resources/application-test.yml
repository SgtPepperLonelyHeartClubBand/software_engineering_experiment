server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:seu_market_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

jwt:
  secret: seu-market-test-secret-change-in-production-must-be-long
  expiration-ms: 604800000

auth:
  dev-fixed-code: "123456"
  code-expiration-minutes: 5
  send-interval-seconds: 60

app:
  upload:
    dir: ${java.io.tmpdir}/seu-market-test-uploads
    max-size-bytes: 5242880
